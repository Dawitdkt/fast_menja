name: fast_menja
description: Driving theory test 4-in-1 mobile app for learner drivers
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # Navigation
  go_router: ^13.0.0

  # Markdown Rendering
  flutter_markdown: ^0.6.0
  markdown: ^7.0.0

  # Local Storage
  hive_flutter: ^1.1.0
  hive: ^2.2.0
  flutter_secure_storage: ^9.0.0

  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.15.0
  cloud_firestore: ^4.13.0
  firebase_storage: ^11.5.0
  firebase_messaging: ^14.6.0
  firebase_remote_config: ^4.3.0

  # Authentication
  google_sign_in: ^6.1.0
  sign_in_with_apple: ^6.1.0

  # Billing
  purchases_flutter: ^6.34.0

  # Video
  video_player: ^2.8.0
  cached_network_image: ^3.3.0

  # HTTP & Networking
  http: ^1.1.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.0.0
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  riverpod_generator: ^2.3.0
  build_runner: ^2.4.0
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/lessons/
    - assets/questions.json
    - assets/lessons_index.json
    - .env

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
