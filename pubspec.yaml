name: fast_menja
description: Driving theory test 4-in-1 mobile app for learner drivers
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # Navigation
  go_router: ^13.0.0

  # Typography
  google_fonts: ^6.2.1

  # Markdown Rendering
  flutter_markdown: ^0.6.0
  markdown: ^7.0.0

  # Local Storage
  hive_flutter: ^1.1.0
  hive: ^2.2.0
  flutter_secure_storage: ^9.0.0

  # Supabase
  supabase_flutter: ^2.9.1

  # Billing
  purchases_flutter: ^8.11.0

  # Video
  video_player: ^2.8.0
  cached_network_image: ^3.3.0

  # HTTP & Networking
  http: ^1.1.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.0.0
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  riverpod_generator: ^2.3.0
  build_runner: ^2.4.0
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/lessons/
    - assets/lessons/section-01-alertness/
    - assets/lessons/section-02-attitude/
    - assets/lessons/section-03-safety-and-your-vehicle/
    - assets/lessons/section-04-safety-margins/
    - assets/lessons/section-05-hazard-awareness/
    - assets/lessons/section-06-vulnerable-road-users/
    - assets/lessons/section-07-other-types-of-vehicle/
    - assets/lessons/section-08-vehicle-handling/
    - assets/lessons/section-09-motorway-rules/
    - assets/lessons/section-11-road-and-traffic-signs/
    - assets/lessons/section-12-documents/
    - assets/lessons/section-13-accidents/
    - assets/questions.json
    - assets/lessons_index.json
    - .env
